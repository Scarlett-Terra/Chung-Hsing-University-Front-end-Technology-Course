<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>14.fontAlsome</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <!-- fontAlsome (選free)= 很多icon 搜索網站，免費拿取 -->
<!-- fontAwesomeCDN 搜索 直接執行後連接進來 href:的連結 
     =>找free 不要找左上的pro版本 這個要錢-->
<style>
    .fa-regular.fa-user{
        font-size: 50px;
    }

    /* chevron :英文icon 向下的箭頭 */
</style>

</head>
<body>
    <i class="fa-regular fa-user">大人物</i>
    <i class="fa-solid fa-ban-smoking">禁止吸菸</i>
    <i class="fa-brands fa-freebsd">炸彈</i>
    <i class="fa-solid fa-chevron-down">向下的箭頭</i>
</body>
</html>
