<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2.繞著圓形圖框跑</title>
    <style>
        body {
            margin: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #f8fafc;
        }

        .box {
            width: clamp(220px, 72vmin, 500px);
            height: clamp(220px, 72vmin, 500px);
            background-color: salmon;
            /* 善用display:flex 去置中，就少用margin:auto; */
            /* margin: auto; */
            position: relative;
            background-image: url(./img/對話框.jpg);
            background-size: cover;
            border-radius: 50%;

            /* 執行動畫的名字 */
            animation-name: roll-box;
            animation-duration:3s;
            animation-iteration-count: infinite;
            animation-timing-function: linear;
            
        }

        /* 繞球的話，要依照爸爸為基準去跑， */
        .box-1 {
            background-color: aquamarine;
            width: clamp(56px, 16vmin, 100px);
            height: clamp(56px, 16vmin, 100px);
            position: absolute;
            left: 50%;
            top: 0;
            /* 把box位置移到 左上的對角線 */
            transform: translate(-50%, -100%);
            /* 執行動畫的名字 */
            /* animation-name: roll-box;
            animation-duration:10s; */

            
            background-image: url(./img/miaoMi.jpg);
            background-size: cover;
            border-radius: 50%;
        }

        /* /////// 動畫  地球自轉，不用跑，自己轉就好////// */
        @keyframes roll-box {
            /* 先做起始值 */
            0% {
                left: 0;
                top: 0;
                transform: rotate(360deg);
                background-image: url(./img/miaoMi.jpg);
                background-size: cover;
                border-radius: 50%;
            }
            
        }
    </style>

</head>

<body>

    <div class="box">
        <div class="box-1"></div>
    </div>

</body>

</html>
