<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 動畫小作業集</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            padding: 42px 18px;
            background: #0f172a;
            color: #f8fafc;
            font-family: "Microsoft JhengHei", Arial, sans-serif;
        }

        .page {
            width: min(860px, 100%);
            margin: 0 auto;
        }

        .hero {
            margin-bottom: 24px;
            padding: 30px;
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 18px;
            background: rgba(15, 23, 42, 0.72);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
        }

        .eyebrow {
            margin: 0 0 10px;
            color: #facc15;
            font-size: 0.86rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 6vw, 3.3rem);
            line-height: 1.15;
            letter-spacing: 0;
        }

        .hero p {
            max-width: 680px;
            margin: 14px 0 0;
            color: #cbd5e1;
            font-size: 1.05rem;
            line-height: 1.75;
        }

        .work-list {
            display: grid;
            gap: 14px;
        }

        .work-link {
            display: grid;
            grid-template-columns: 70px 1fr 32px;
            align-items: center;
            min-height: 70px;
            padding: 12px 18px 12px 12px;
            border: 1px solid rgba(148, 163, 184, 0.34);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.06);
            color: #f8fafc;
            text-decoration: none;
            transition: transform 0.2s, background-color 0.2s, border-color 0.2s, box-shadow 0.2s;
        }

        .work-link:hover,
        .work-link:active {
            border-color: #facc15;
            background: rgba(250, 204, 21, 0.13);
            box-shadow: 0 12px 28px rgba(250, 204, 21, 0.16);
            transform: translateY(-2px);
        }

        .work-link:active {
            transform: translateY(0);
        }

        .work-number {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 48px;
            height: 48px;
            border-radius: 13px;
            background: #facc15;
            color: #111827;
            font-weight: 900;
        }

        .work-title {
            font-size: 1.22rem;
            font-weight: 800;
            line-height: 1.35;
        }

        .work-arrow {
            justify-self: end;
            width: 12px;
            height: 12px;
            border-top: 3px solid #facc15;
            border-right: 3px solid #facc15;
            transform: rotate(45deg);
            transition: transform 0.2s, border-color 0.2s;
        }

        .work-link:hover .work-number,
        .work-link:active .work-number {
            background: #38bdf8;
        }

        .work-link:hover .work-arrow,
        .work-link:active .work-arrow {
            border-color: #38bdf8;
            transform: translateX(4px) rotate(45deg);
        }

        @media (max-width: 560px) {
            body {
                padding: 22px 12px;
            }

            .hero {
                padding: 22px 16px;
            }

            .work-link {
                grid-template-columns: 58px 1fr 24px;
                min-height: 64px;
                padding: 10px 14px 10px 10px;
            }

            .work-number {
                width: 42px;
                height: 42px;
                border-radius: 12px;
                font-size: 0.95rem;
            }

            .work-title {
                font-size: 1.05rem;
            }
        }
    </style>
</head>

<body>
    <main class="page">
        <section class="hero">
            <p class="eyebrow">CSS Animation Effects</p>
            <h1>CSS 動畫小作業集</h1>
            <p>把第 08 題的動畫練習整理成 GitHub Pages 可以正常呈現的入口頁，點選任一項即可開啟對應作品。</p>
        </section>

        <section class="work-list" aria-label="CSS 動畫小作業清單">
            <a class="work-link" href="./Color-changing-ball.html" target="_blank" rel="noopener noreferrer">
                <span class="work-number">01</span>
                <span class="work-title">顏色變化球</span>
                <span class="work-arrow"></span>
            </a>
            <a class="work-link" href="./Poke-Ball.html" target="_blank" rel="noopener noreferrer">
                <span class="work-number">02</span>
                <span class="work-title">小精靈追球跑</span>
                <span class="work-arrow"></span>
            </a>
            <a class="work-link" href="./cat-spinning.html" target="_blank" rel="noopener noreferrer">
                <span class="work-number">03</span>
                <span class="work-title">旋轉動畫練習</span>
                <span class="work-arrow"></span>
            </a>
            <a class="work-link" href="./cat-around-the-square.html" target="_blank" rel="noopener noreferrer">
                <span class="work-number">04</span>
                <span class="work-title">繞方形路徑動畫</span>
                <span class="work-arrow"></span>
            </a>
            <a class="work-link" href="./gif-people-running-on-Earth.html" target="_blank" rel="noopener noreferrer">
                <span class="work-number">05</span>
                <span class="work-title">地球跑步 GIF 動畫</span>
                <span class="work-arrow"></span>
            </a>
            <a class="work-link" href="./moon-revolves-around-the-earth.html" target="_blank" rel="noopener noreferrer">
                <span class="work-number">06</span>
                <span class="work-title">月亮繞地球動畫</span>
                <span class="work-arrow"></span>
            </a>
            <a class="work-link" href="./box-shadow.html" target="_blank" rel="noopener noreferrer">
                <span class="work-number">07</span>
                <span class="work-title">Box Shadow 練習</span>
                <span class="work-arrow"></span>
            </a>
            <a class="work-link" href="./scss-loading-專案/loading-1.html" target="_blank" rel="noopener noreferrer">
                <span class="work-number">08</span>
                <span class="work-title">SCSS Loading 動畫</span>
                <span class="work-arrow"></span>
            </a>
        </section>
    </main>
</body>

</html>
