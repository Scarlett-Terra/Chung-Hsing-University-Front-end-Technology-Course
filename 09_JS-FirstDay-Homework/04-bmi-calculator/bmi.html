<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>BMI Analyzer</title>

  <style>
    /* ===== 基本設定 ===== */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle, #0f2027, #203a43, #2c5364);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* ===== 容器 ===== */
    .container {
      width: 90%;
      max-width: 420px;
    }

    /* ===== 卡片（科技風玻璃） ===== */
    .card {
      backdrop-filter: blur(15px);
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
    }

    .title {
      text-align: center;
      color: #00f0ff;
    }

    /* ===== 表單 ===== */
    .form-group {
      margin-top: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
    }

    .input-style {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
    }

    /* ===== 按鈕 ===== */
    .btn-primary {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      border-radius: 15px;
      background: #00f0ff;
      border: none;
      cursor: pointer;
      box-shadow: 0 0 10px #00f0ff;
    }

    /* ===== 結果 ===== */
    .result-box {
      text-align: center;
      margin-top: 20px;
    }

    .bmi-value {
      font-size: 40px;
      color: #00f0ff;
    }

    /* ===== 表格 ===== */
    .bmi-table {
      margin-top: 20px;
      width: 100%;
      border-collapse: collapse;
    }

    .bmi-table td {
      padding: 10px;
      text-align: center;
    }

    /* 顏色區分 */
    .under {
      background: #3498db;
    }

    .normal {
      background: #2ecc71;
    }

    .over {
      background: #f39c12;
    }

    .obese {
      background: #e74c3c;
    }

    /* 高亮 */
    .active {
      box-shadow: 0 0 15px white;
      transform: scale(1.05);
    }

    /* RWD */
    @media (min-width:768px) {
      .container {
        max-width: 600px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="card">

      <h1 class="title">BMI Analyzer</h1>

      <!-- 性別 -->
      <div class="form-group">
        <label for="genderInput">性別</label>
        <select id="genderInput" class="input-style">
          <option value="male">男</option>
          <option value="female">女</option>
        </select>
      </div>

      <!-- 身高 -->
      <div class="form-group">
        <label for="heightInput">身高 (cm)</label>
        <input id="heightInput" class="input-style" type="number">
      </div>

      <!-- 體重 -->
      <div class="form-group">
        <label for="weightInput">體重 (kg)</label>
        <input id="weightInput" class="input-style" type="number">
      </div>

      <button id="calculateBtn" class="btn-primary">開始分析</button>

      <!-- 結果 -->
      <div class="result-box">
        <div id="bmiValue" class="bmi-value">0</div>
        <div id="statusText"></div>
      </div>

      <!-- BMI 對照表 -->
      <table class="bmi-table">
        <tr>
          <td id="underCell" class="under">過輕<br>
            <18.5< /td>
          <td id="normalCell" class="normal">正常<br>18.5~22.9</td>
          <td id="overCell" class="over">中度肥胖<br>25~29.9</td>
          <td id="obeseCell" class="obese">嚴重肥胖<br>>30</td>
        </tr>
      </table>

    </div>
  </div>

  <script>
    // ===== 主按鈕事件 =====
    document.querySelector("#calculateBtn").addEventListener("click", function () {

      const height = document.querySelector("#heightInput").value;
      const weight = document.querySelector("#weightInput").value;

      if (!height || !weight) {
        alert("請輸入完整資料");
        return;
      }

      const h = height / 100;
      const bmi = weight / (h * h);

      animateBmi(bmi);
      updateTable(bmi);
      showStatus(bmi);
    });

    // ===== 動畫 =====
    function animateBmi(target) {
      let current = 0;
      const timer = setInterval(() => {
        current += 0.5;
        if (current >= target) {
          current = target;
          clearInterval(timer);
        }
        document.querySelector("#bmiValue").innerText = current.toFixed(1);
      }, 20);
    }

    // ===== 顯示狀態 =====
    function showStatus(bmi) {
      let text = "";

      if (bmi < 18.5) text = "過輕 😢";
      else if (bmi < 23) text = "正常 😊";
      else if (bmi < 30) text = "中度肥胖 😅";
      else text = "嚴重肥胖 😵";

      document.querySelector("#statusText").innerText = text;
    }

    // ===== 表格高亮 =====
    function updateTable(bmi) {

      const cells = ["underCell", "normalCell", "overCell", "obeseCell"];

      cells.forEach(id => {
        document.getElementById(id).classList.remove("active");
      });

      let target = "";

      if (bmi < 18.5) target = "underCell";
      else if (bmi < 23) target = "normalCell";
      else if (bmi < 30) target = "overCell";
      else target = "obeseCell";

      document.getElementById(target).classList.add("active");
    }
  </script>

</body>

</html>
