<!-- 最外層的 index.html 傳送門內容 -->
<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的第一週 JS 作業集錦</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background: #eef1f5;
            padding: 48px 20px;
            color: #1f2937;
        }

        .menu-card {
            background: white;
            width: min(720px, 100%);
            margin: 0 auto;
            padding: 36px;
            border-radius: 16px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 5vw, 3rem);
            line-height: 1.2;
            letter-spacing: 0;
        }

        .title-mark {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 40px;
            height: 40px;
            margin-left: 10px;
            border-radius: 12px;
            background-color: #2563eb;
            color: white;
            font-size: 1.35rem;
            vertical-align: middle;
        }

        hr {
            margin: 24px 0;
            border: 0;
            border-top: 1px solid #d7dce3;
        }

        .menu-list {
            display: grid;
            gap: 14px;
        }

        .menu-link {
            display: grid;
            grid-template-columns: 72px 1fr 34px;
            align-items: center;
            min-height: 70px;
            padding: 12px 18px 12px 14px;
            border: 1px solid #dce2ea;
            border-radius: 12px;
            background-color: #f8fafc;
            color: #1f2937;
            text-decoration: none;
            font-size: 1.35rem;
            font-weight: 700;
            text-align: left;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s, background-color 0.2s;
        }

        .menu-link:hover {
            border-color: #2563eb;
            background-color: #eff6ff;
            box-shadow: 0 10px 24px rgba(37, 99, 235, 0.16);
            transform: translateY(-2px);
        }

        .menu-link:active {
            transform: translateY(0);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.14);
        }

        .menu-link:focus-visible {
            outline: 3px solid rgba(37, 99, 235, 0.35);
            outline-offset: 3px;
        }

        .menu-number {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background-color: #d66834;
            color: white;
            font-size: 1.05rem;
            font-weight: 800;
        }
        .menu-link:hover .menu-number {
            background-color: #405bf3;
        }

        .menu-text {
            line-height: 1.35;
        }

        .menu-arrow {
            justify-self: end;
            width: 12px;
            height: 12px;
            border-top: 3px solid #64748b;
            border-right: 3px solid #64748b;
            transform: rotate(45deg);
            transition: border-color 0.2s, transform 0.2s;
        }

        .menu-link:hover .menu-arrow {
            border-color: #2563eb;
            transform: translateX(4px) rotate(45deg);
        }

        @media (max-width: 560px) {
            body {
                padding: 20px 12px;
            }

            .menu-card {
                padding: 24px 16px;
                border-radius: 14px;
            }

            .title-mark {
                width: 34px;
                height: 34px;
                border-radius: 10px;
                font-size: 1.1rem;
            }

            .menu-link {
                grid-template-columns: 56px 1fr 24px;
                min-height: 64px;
                padding: 10px 14px 10px 10px;
                font-size: 1.12rem;
            }

            .menu-number {
                width: 42px;
                height: 42px;
                border-radius: 12px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>

<body>

</html>
