<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仿切FB</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 3000px;
            overflow-x: hidden;
        }

        * {
            box-sizing: border-box;
        }

        /* 有position只能用一次，不能再多加 */
        #nav {
            background-color: salmon;
            width: 100%;
            height: 56px;
            top: 0;
            left: 0;
            position: fixed;
            z-index: 1;
        }

        #all {

            width: 100%;
            height: 600px;
            margin-top: 56px;
            background: linear-gradient(to top, pink, white);
        }

        #banner {
            background-color: bisque;
            width: 70%;
            height: 400px;
            margin: auto;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            background-image: url(./img/背景.jpg);
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            position: relative;
        }

        /* 想做absolute的時候，上層父層是誰，就是基準點relative */
        #avatar {
            background-color: bisque;
            width: 168px;
            height: 168px;
            position: absolute;
            border-radius: 50%;
            bottom: -90px;
            left: 35px;
            background-image: url(./img/男主.png);
            background-size: cover;
            background-position: -2px -5px;
            border: 3px solid white;
            background-repeat: no-repeat;
        }

        #avatar-camara {
            background-color: rgb(227, 226, 226);
            width: 40px;
            height: 40px;
            position: absolute;
            right: -2px;
            bottom: 3px;
            border-radius: 50%;
            font-size: 12px;
            color: aliceblue;
            line-height: 18px;
            text-align: center;
            background-repeat: no-repeat;
            background-image: url(./fb/camara.svg);
            background-size: 24px;
            background-position: center;
        }

        #nav-left {
            background-color: rgb(6, 6, 6);
            width: 30%;
            height: 100%;
            position: absolute;
            left: 0;
            top: 0;
        }

        #fb {
            background-color: rgb(27, 61, 235);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            position: absolute;
            left: 20px;
            top: 8px;
            background-image: url(./fb/fb.svg);
        }

        /* 只要固定fixd內的話，要用position 去給他絕對位置固定起來 */
        #search {
            background-color: rgb(72, 71, 71);
            width: 42%;
            height: 40px;
            position: absolute;
            top: 10px;
            left: 70px;
            border-radius: 30px;

        }

        /* 不要用cover，否則圖示太大 */
        #search-img {

            width: 40px;
            height: 40px;
            position: absolute;
            left: 0px;
            top: 0px;
            background-image: url(./fb/serch.svg);
            background-position: center;
            background-repeat: no-repeat;
        }

        #search-text {

            width: 80%;
            height: 40px;
            position: absolute;
            left: 25%;
            top: 0px;
            color: rgb(170, 171, 171);
            line-height: 40px;
        }

        #nav-center {
            background-color: rgb(176, 253, 159);
            width: 40%;
            height: 100%;
            position: absolute;
            left: 30%;
            top: 0;
        }

        #nav-center-home {
            background-color: rgb(7, 7, 7);
            width: 20%;
            height: 100%;
            position: absolute;
            left: 0;
            top: 0;
            background-image: url(./fb/home.svg);
            background-repeat: no-repeat;
            background-size: 24px;
            background-position: center;
        }

        #nav-center-friend {
            background-color: rgb(7, 7, 7);
            width: 20%;
            height: 100%;
            position: absolute;
            left: 20%;
            top: 0;
            background-image: url(./fb/friend.svg);
            background-repeat: no-repeat;
            background-size: 24px;
            background-position: center;
        }

        #nav-center-reel {
            background-color: rgb(7, 7, 7);
            width: 20%;
            height: 100%;
            position: absolute;
            left: 40%;
            top: 0;
            background-image: url(./fb/reel.svg);
            background-repeat: no-repeat;
            background-size: 24px;
            background-position: center;
        }

        #nav-center-shop {
            background-color: rgb(7, 7, 7);
            width: 20%;
            height: 100%;
            position: absolute;
            right: 20%;
            top: 0;
            background-image: url(./fb/shop.svg);
            background-repeat: no-repeat;
            background-size: 24px;
            background-position: center;
        }

        #nav-center-game {
            background-color: rgb(7, 7, 7);
            width: 20%;
            height: 100%;
            position: absolute;
            right: 0;
            top: 0;
            background-image: url(./fb/game.svg);
            background-repeat: no-repeat;
            background-size: 24px;
            background-position: center;
        }




        /* ///////照相機位置////// */
        #carama {
            background-color: rgb(255, 254, 254);
            width: 150px;
            height: 30px;
            position: absolute;
            bottom: 20px;
            right: 35px;
            border-radius: 10px;

        }

        /* 不要用cover，否則圖示太大 */
        #carama-img {

            width: 30px;
            height: 30px;
            position: absolute;
            left: 0px;
            top: 0px;
            background-image: url(./fb/camara.svg);
            background-position: center;
            background-repeat: no-repeat;
        }

        #carama-text {
            width: 60%;
            height: 30px;
            position: absolute;
            font-size: 15px;
            left: 25%;
            top: 0px;
            color: rgb(54, 54, 55);
            line-height: 30px;
        }

        /* 右上角的右半段 */
        #nav-right {
            background-color: rgb(12, 12, 12);
            width: 30%;
            height: 100%;
            position: absolute;
            right: 0;
            top: 0;
        }


        #nav-right-myselfHomepage {

            width: 10%;
            height: 100%;
            position: absolute;
            right: 5%;
            top: 0;
            background-image: url(./img/男主.png);
            background-repeat: no-repeat;
            border-radius: 50%;
            padding: 0.5px;
            background-size: 62px;
            background-position: -2px 0px;
            border: 0.5px solid snow;
        }

        #nav-right-dingdong-arror {
            background-color: rgb(115, 114, 114);
            width: 11px;
            height: 11px;
            position: absolute;
            right: -2px;
            bottom: 3px;
            border-radius: 50%;
            font-size: 12px;
            color: aliceblue;
            line-height: 18px;
            text-align: center;
            background-image: url(./fb/arrow.svg);
            background-size: cover;
            background-position: 0px;
            border: 1px solid rgb(248, 248, 247);
        }

        #nav-right-dingdong {
            background-color: rgb(49, 48, 48);
            width: 8%;
            height: 80%;
            position: absolute;
            right: 20%;
            top: 8px;
            background-image: url(./fb/dingdong.svg);
            background-repeat: no-repeat;
            background-size: 20px;
            background-position: center;
            border-radius: 50%;
        }

        #nav-right-message {
            background-color: rgb(49, 48, 48);
            width: 8%;
            height: 80%;
            position: absolute;
            right: 30%;
            top: 8px;
            background-image: url(./fb/message.svg);
            background-repeat: no-repeat;
            background-size: 20px;
            background-position: center;
            border-radius: 50%;
        }

        #nav-right-message-number {
            background-color: rgb(232, 47, 47);
            width: 18px;
            height: 18px;
            position: absolute;
            right: -5px;
            top: -5px;
            border-radius: 50%;
            font-size: 12px;
            color: aliceblue;
            line-height: 18px;
            text-align: center;
        }

        #nav-right-ninedot {
            background-color: rgb(49, 48, 48);
            width: 8%;
            height: 80%;
            position: absolute;
            right: 40%;
            top: 8px;
            background-image: url(./fb/ninedot.svg);
            background-repeat: no-repeat;
            background-size: 20px;
            background-position: center;
            border-radius: 50%;
        }

        #nav-right-dingdong-number {
            background-color: rgb(232, 47, 47);
            width: 18px;
            height: 18px;
            position: absolute;
            right: -5px;
            top: -5px;
            border-radius: 50%;
            font-size: 12px;
            color: aliceblue;
            line-height: 18px;
            text-align: center;
        }

        /* ////// 新增區塊 add /// */
        #add {
            background-color: #0866ff;
            width: 160px;
            height: 30px;
            position: absolute;
            bottom: -60px;
            right: 255px;
            border-radius: 10px;

        }

        /* 不要用cover，否則圖示太大 */
        #add-img {

            width: 40px;
            height: 30px;
            position: absolute;
            left: 0px;
            top: 0px;
            background-image: url(./fb/plus.png);
            background-position: center;
            background-repeat: no-repeat;
        }

        #add-text {
            font-size: 12px;
            line-height: 10px;
            text-align: left;
            color: white;
            width: 100%;
            height: 30px;
            position: absolute;
            left: 25%;
            top: 0px;
            line-height: 30px;
        }

        /* ///編輯個人檔案/// */
        /* ////// 新增區塊 add /// */
        #eddit {
            background-color: #616060;
            width: 160px;
            height: 30px;
            position: absolute;
            bottom: -60px;
            right: 90px;
            border-radius: 10px;

        }

        /* 不要用cover，否則圖示太大 */
        #eddit-img {

            width: 40px;
            height: 30px;
            position: absolute;
            left: 0px;
            top: 0px;
            background-image: url(./fb/eddit.svg);
            background-position: center;
            background-repeat: no-repeat;
        }

        #eddit-text {
            font-size: 12px;
            line-height: 10px;
            text-align: left;
            color: white;
            width: 100%;
            height: 30px;
            position: absolute;
            left: 25%;
            top: 0px;
            line-height: 30px;
        }


        /* ///箭頭上//// */
        #arrow {
            background-color: #616060;
            width: 50px;
            height: 30px;
            position: absolute;
            bottom: -60px;
            right: 35px;
            border-radius: 10px;
        }

        /* 不要用cover，否則圖示太大 */
        #arrow-img {

            width: 30px;
            height: 30px;
            position: absolute;
            left: 0px;
            top: 0px;
            background-image: url(./fb/arrow.svg);
            background-position: right;
            background-repeat: no-repeat;
        }

        /* ///取名字/// */
        #name {
            width: 200px;
            height: 50px;
            bottom: -60px;
            left: 220px;
            position: absolute;
        }

        #myName {
            color: #060606;
            font-size: 30px;
            font-weight: bolder;
            font-family: '標楷體';
        }

        #friendNumber {

            color: #706f6f;
            font-size: 18px;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }

        #footer-button {
            margin: auto;
            width: 95%;
            height: 90px;
            position: absolute;
            bottom: -200px;
            left: 35px;
            border-top: 1px solid rgb(198, 197, 197);
        }

        #footer-button-left {
            float: left;
            width: 60%;
            height: 100%;
            position: absolute;
        }



        /* ///底層文字// */
        #footer-button-left-post {
            width: 12%;
            height: 100%;
            position: absolute;
            line-height: 100px;
            text-align: center;
            left: 0;
            top: 0;
            font-size: 15px;
            color: #545454;
            font-weight: bolder;
        }

        #footer-button-left-about {
            width: 14%;
            height: 100%;
            position: absolute;
            line-height: 100px;
            text-align: center;
            left: 8%;
            top: 0;
            font-size: 15px;
            color: #545454;
            font-weight: bolder;
        }

        #footer-button-left-friend {
            width: 14%;
            height: 100%;
            position: absolute;
            line-height: 100px;
            text-align: center;
            left: 16%;
            top: 0;
            font-size: 15px;
            color: #545454;
            font-weight: bolder;
        }

        #footer-button-left-photo {
            width: 14%;
            height: 100%;
            position: absolute;
            line-height: 100px;
            text-align: center;
            left: 24%;
            top: 0;
            font-size: 15px;
            color: #545454;
            font-weight: bolder;
        }

        #footer-button-left-reel {
            width: 14%;
            height: 100%;
            position: absolute;
            line-height: 100px;
            text-align: center;
            left: 32%;
            top: 0;
            font-size: 15px;
            color: #545454;
            font-weight: bolder;
        }

        #footer-button-left-status {
            width: 14%;
            height: 100%;
            position: absolute;
            line-height: 100px;
            text-align: center;
            left: 42%;
            top: 0;
            font-size: 15px;
            color: #545454;
            font-weight: bolder;
        }

        #footer-button-left-more {
            width: 10%;
            height: 100%;
            position: absolute;
            line-height: 100px;
            text-align: left;
            left: 58%;
            top: 0;
            font-size: 15px;
            color: #545454;
            font-weight: bolder;
        }

        #footer-button-left-more-arrow {
            background-color: rgb(134, 131, 133);
            width: 11px;
            height: 11px;
            position: absolute;
            right: calc(50% - 11px);
            bottom: calc(50% - 11px);
            font-size: 12px;
            color: aliceblue;
            line-height: 18px;
            text-align: center;
            background-image: url(./fb/arrow.svg);
            background-size: cover;
            background-position: 0px;
        }

        #footer-button-right {
            float: right;
            width: 40%;
            height: 100%;
            position: absolute;
            right: 0;
            top: 0;
        }

        #footer-button-right-threeDot {
            background-color: #616060;
            width: 50px;
            height: 30px;
            position: absolute;
            bottom: 28px;
            right: 3px;
            border-radius: 10px;
        }

        #footer-button-right-threeDot-img {

            width: 30px;
            height: 30px;
            position: absolute;
            left: 0px;
            top: 0px;
            background-image: url(./fb/colon.svg);
            background-position: right;
            background-repeat: no-repeat;

        }

        @media (max-width: 1024px) {
            #banner {
                width: 90%;
            }

            #search {
                width: 44%;
            }

            #search-text {
                font-size: 14px;
            }

            #add {
                right: 230px;
            }

            #eddit {
                right: 65px;
            }

            #arrow {
                right: 10px;
            }
        }

        @media (max-width: 768px) {
            body {
                background-color: #f0f2f5;
            }

            #nav-left {
                width: 42%;
            }

            #nav-center {
                display: none;
            }

            #nav-right {
                width: 58%;
            }

            #search {
                width: 40px;
                left: 70px;
            }

            #search-text {
                display: none;
            }

            #nav-right-myselfHomepage,
            #nav-right-dingdong,
            #nav-right-message,
            #nav-right-ninedot {
                width: 40px;
                height: 40px;
                top: 8px;
                border-radius: 50%;
            }

            #nav-right-myselfHomepage {
                right: 8px;

            }

            #nav-right-dingdong {
                right: 58px;
            }

            #nav-right-message {
                right: 108px;

            #nav-right-ninedot {

            }

            }

            }

            #carama-img {
                width: 46px;

            }

            #carama-text {
                display: none;
            }

            #avatar {
                width: 132px;
                height: 132px;
                left: 50%;
                bottom: -72px;
                transform: translateX(-50%);
            }

            #avatar-camara {
                width: 34px;
                height: 34px;
                background-size: 20px;
            }

            #name {
                width: 100%;
                height: auto;
                left: 0;
                bottom: -140px;
                text-align: center;
            }

            #myName {
                font-size: 28px;
            }

            #friendNumber {
                font-size: 16px;
                margin-top: 4px;
            }

            #add,
            #eddit {
                width: calc(50% - 18px);
                height: 36px;
                bottom: -195px;
                border-radius: 8px;
            }

            #add {
                left: 12px;
                right: auto;
            }

            #eddit {
                left: auto;
                right: 12px;
            }

            #add-img,
            #eddit-img {
                width: 34px;
                height: 36px;
            }

            #add-text,
            #eddit-text {
                left: 34px;
                width: calc(100% - 34px);
                height: 36px;
                line-height: 36px;
                font-size: 12px;
                text-align: center;
            }

            #arrow {
                width: 48px;

                right: 12px;
                bottom: -240px;
                border-radius: 8px;
            }

            #arrow-img {
                width: 48px;

                background-position: center;
            }

            #footer-button {
                width: calc(100% - 24px);
                height: 78px;
                left: 12px;
                bottom: -335px;
            }

            #footer-button-left {
                width: calc(100% - 62px);
                height: 100%;
                position: relative;
                overflow: visible;
                white-space: normal;
            }

            #footer-button-left-post {
                width: 120px;
                height: 44px;
                position: absolute;
                left: 0;
                top: 17px;
                padding: 0 36px 0 16px;
                border-radius: 8px;
                background-color: #e4e6eb;
                line-height: 44px;
                text-align: left;
                cursor: pointer;
                transition: background-color 0.2s, color 0.2s;
                user-select: none;
            }

            #footer-button-left-post:hover {
                background-color: #d8dadf;
            }

            #footer-button-left-post:active {
                background-color: #ccd0d5;
            }

            #footer-button-left-post::after {
                content: "";
                width: 8px;
                height: 8px;
                position: absolute;
                right: 16px;
                top: 15px;
                border: solid #545454;
                border-width: 0 2px 2px 0;
                transform: rotate(45deg);
                transition: top 0.2s, transform 0.2s;
            }

            #footer-menu-switch:checked+#footer-button-left-post {
                background-color: #dbe7ff;
                color: #0866ff;
            }

            #footer-menu-switch:checked+#footer-button-left-post::after {
                top: 19px;
                border-color: #0866ff;
                transform: rotate(-135deg);
            }

            #footer-button-left-about,
            #footer-button-left-friend,
            #footer-button-left-photo,
            #footer-button-left-reel,
            #footer-button-left-status,
            #footer-button-left-more {
                display: none;

                height: 40px;
                position: absolute;
                left: 0;
                padding: 0 16px;
                background-color: #fff;
                line-height: 40px;
                text-align: left;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
                z-index: 2;
                cursor: pointer;
            }

            #footer-button-left-about:hover,
            #footer-button-left-friend:hover,
            #footer-button-left-photo:hover,
            #footer-button-left-reel:hover,
            #footer-button-left-status:hover,
            #footer-button-left-more:hover {
                background-color: #f0f2f5;
            }

            #footer-button-left-more {
                padding-right: 24px;
                position: absolute;
            }

            #footer-button-left-more-arrow {
                display: none;
            }

            #footer-menu-switch:checked~#footer-button-left-about {
                display: block;
                top: 66px;
                border-top-left-radius: 8px;
                border-top-right-radius: 8px;
            }

            #footer-menu-switch:checked~#footer-button-left-friend {
                display: block;
                top: 106px;
            }

            #footer-menu-switch:checked~#footer-button-left-photo {
                display: block;
                top: 146px;
            }

            #footer-menu-switch:checked~#footer-button-left-reel {
                display: block;
                top: 186px;
            }

            #footer-menu-switch:checked~#footer-button-left-status {

            #footer-menu-switch:checked~#footer-button-left-more {

            }

            #footer-button-right-threeDot {

                bottom: 24px;
            }

        @media (max-width: 420px) {

            }

            }

            #nav-right-dingdong {
                right: 8px;
            }

            #nav-right-message {
                right: 58px;
            }

            #nav-right-ninedot {
                right: 108px;
            }

            #banner {
                height: 230px;
            }

            #avatar {
                width: 120px;
                height: 120px;
                bottom: -66px;
            }

            #name {
                bottom: -132px;
            }

            #myName {
                font-size: 26px;
            }

            #add-text,
            #eddit-text {
                font-size: 11px;
            }

<body>

        <div id="nav-left">
            <div id="fb"></div>
            <div id="search">
                <div id="search-img"></div>
                <div id="search-text">搜尋 &nbsp;&nbsp;Facebook</div>
            </div>
        </div>
        <!-- nav-center 已經有postion-absulution，所小孩也可以依樣有postion-absulution -->
        <div id="nav-center">
