<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calc作業</title>
    <style>
        #all{
            background-color: rgb(247, 239, 197);
            width: calc(80% - 10px*2) ;
            height: calc(600px - 10px*2) ;
            padding: 10px;
        }
        #header{
            background-color: gold;
            width: 100%;
            height: calc(20% - 10px); ;  
            text-align: center;
            line-height: 120px;
            margin-bottom: 10px;
            font-size: 20px;
        }
        #main{
            background-color: burlywood;
            width: 100%;
            height: calc(60% - 10px); ; 
            margin-bottom: 10px;   
        }
        #main-left{
            background-color: lightblue;
            width: calc(34% - 10px); ;
            height: 100%;   
            text-align: center;
            line-height: 350px;
            font-size: 20px;
            float: left;
            margin-right: 10px;
            
        }
        #main-right{
            background-color: burlywood(243, 210, 210);
            width: 66%;
            height: 100%; 
            float: left;  
        }
        #main-right-top{
            background-color: lightslategrey;
            height: 34% ;
            text-align: center;
            line-height: 120px;
            font-size: 20px;
            
        }
        #main-right-mid{
            background-color: rgb(136, 241, 120);
            height: calc(32% - 10px*2); ;
            text-align: center;
            line-height: 90px;
            font-size: 20px;
            margin: 10px 0;
        }
        #main-right-btm{
            background-color: rgb(238, 238, 83);
            height: 34%;
            text-align: center;
            line-height: 120px;
            font-size: 20px;
            
        }
        #footer{
            background-color: seagreen;
            width: 100%;
            height: 20%;  
            text-align: center;
            line-height: 120px;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div id="all">
        <div id="header">header</div>
        <div id="main">
            <div id="main-left">main-left</div>
            <div id="main-right">
                <div id="main-right-top">main-right-top</div>
                <div id="main-right-mid">main-right-mid</div>
                <div id="main-right-btm">main-right-btm</div>
            </div>
        </div>
        <div id="footer">footer</div>
    </div>
</body>
</html>
